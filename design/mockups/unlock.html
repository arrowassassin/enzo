  .bio{width:368px;background:#1d1a28;border:2px solid #3a3450;border-radius:7px;padding:11px;font-family:'Silkscreen';font-size:9px;color:#9f97c4;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px;}
  .links{display:flex;gap:18px;font-size:11px;color:#5f5e6e;}
  .links a{color:#7f77dd;text-decoration:none;}
  .foot{display:flex;gap:14px;padding:7px 14px;background:#221d30;border-top:3px solid #3a3450;font-family:'Silkscreen';font-size:8px;color:#9f97c4;}
</style></head><body>
<div class="frame">
