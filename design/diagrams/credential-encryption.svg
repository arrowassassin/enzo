<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 620" font-family="monospace">
  <rect width="760" height="620" fill="#16131f"/>
  <text x="30" y="40" fill="#9f97c4" font-size="20" font-weight="bold">Credential vault — key hierarchy &amp; unlock</text>
  <text x="30" y="62" fill="#5f5e6e" font-size="12">Master password = root private key. OS keystore = convenience path. Envelope encryption.</text>

  <!-- unlock paths -->
  <text x="30" y="100" fill="#7f77dd" font-size="13" font-weight="bold">UNLOCK PATHS (any one unwraps the same Vault Key)</text>

  <rect x="30" y="115" width="220" height="70" rx="6" fill="#1a1626" stroke="#5dcaa5" stroke-width="2"/>
  <text x="45" y="138" fill="#5dcaa5" font-size="12" font-weight="bold">A · Master password</text>
  <text x="45" y="158" fill="#c9c4dc" font-size="11">Argon2id(salt, params)</text>
  <text x="45" y="175" fill="#888780" font-size="10">→ Master Key (never stored)</text>

  <rect x="270" y="115" width="220" height="70" rx="6" fill="#1a1626" stroke="#534ab7" stroke-width="2"/>
  <text x="285" y="138" fill="#afa9ec" font-size="12" font-weight="bold">B · OS keystore</text>
  <text x="285" y="158" fill="#c9c4dc" font-size="11">Touch ID / Hello / keyring</text>
  <text x="285" y="175" fill="#888780" font-size="10">→ device key (Enclave/TPM)</text>

  <rect x="510" y="115" width="220" height="70" rx="6" fill="#1a1626" stroke="#ba7517" stroke-width="2"/>
  <text x="525" y="138" fill="#ef9f27" font-size="12" font-weight="bold">C · Recovery code</text>
  <text x="525" y="158" fill="#c9c4dc" font-size="11">Argon2id(recovery)</text>
  <text x="525" y="175" fill="#888780" font-size="10">→ shown once, offline</text>

  <!-- arrows to VK -->
  <line x1="140" y1="185" x2="300" y2="235" stroke="#5dcaa5" stroke-width="2"/>
  <line x1="380" y1="185" x2="380" y2="235" stroke="#534ab7" stroke-width="2"/>
  <line x1="620" y1="185" x2="460" y2="235" stroke="#ba7517" stroke-width="2"/>
  <text x="395" y="215" fill="#5f5e6e" font-size="10">each "key slot" wraps VK</text>

  <!-- Vault Key -->
  <rect x="250" y="235" width="260" height="60" rx="6" fill="#221d30" stroke="#9f97c4" stroke-width="2"/>
  <text x="270" y="262" fill="#e8e4f5" font-size="13" font-weight="bold">VAULT KEY (VK)</text>
  <text x="270" y="282" fill="#888780" font-size="11">random 256-bit · stored only wrapped</text>

  <line x1="380" y1="295" x2="380" y2="330" stroke="#9f97c4" stroke-width="2"/>
  <text x="395" y="318" fill="#5f5e6e" font-size="10">VK encrypts every secret (XChaCha20-Poly1305)</text>

  <!-- secrets -->
  <rect x="120" y="330" width="520" height="90" rx="6" fill="#1a1626" stroke="#3a3450"/>
  <text x="140" y="355" fill="#9f97c4" font-size="12" font-weight="bold">ENCRYPTED SECRETS (vault.enc)</text>
  <rect x="140" y="365" width="230" height="42" rx="4" fill="#221d30" stroke="#3a3450"/>
  <text x="150" y="383" fill="#c9c4dc" font-size="10">conn_prod_pg · nonce · aad</text>
  <text x="150" y="399" fill="#ef9f27" font-size="10">ciphertext ••••••</text>
  <rect x="390" y="365" width="230" height="42" rx="4" fill="#221d30" stroke="#3a3450"/>
  <text x="400" y="383" fill="#c9c4dc" font-size="10">conn_stage_mysql · nonce · aad</text>
  <text x="400" y="399" fill="#ef9f27" font-size="10">ciphertext ••••••</text>

  <!-- unlock flow -->
  <text x="30" y="460" fill="#7f77dd" font-size="13" font-weight="bold">UNLOCK FLOW (on launch / after auto-lock)</text>
  <rect x="30" y="475" width="150" height="44" rx="5" fill="#221d30" stroke="#3a3450"/>
  <text x="45" y="502" fill="#c9c4dc" font-size="11">vault locked</text>
  <line x1="180" y1="497" x2="215" y2="497" stroke="#5dcaa5" stroke-width="2" marker-end="url(#a)"/>
  <rect x="215" y="475" width="200" height="44" rx="5" fill="#221d30" stroke="#534ab7"/>
  <text x="228" y="495" fill="#afa9ec" font-size="11">try keystore → OS auth</text>
  <text x="228" y="511" fill="#888780" font-size="10">Touch ID / Hello</text>
  <line x1="415" y1="497" x2="450" y2="497" stroke="#5dcaa5" stroke-width="2" marker-end="url(#a)"/>
  <rect x="450" y="475" width="120" height="44" rx="5" fill="#221d30" stroke="#5dcaa5"/>
  <text x="463" y="502" fill="#5dcaa5" font-size="11">UNLOCKED</text>
  <text x="228" y="540" fill="#888780" font-size="10">else → prompt master password → Argon2id → Master Key → unwrap VK</text>

  <text x="30" y="575" fill="#5f5e6e" font-size="11">VK lives in mlock'd, zeroize-on-drop memory · auto-locks on idle/sleep · scrubbed from logs, scrollback &amp; agent context</text>
  <text x="30" y="595" fill="#5f5e6e" font-size="11">Change master password / add biometrics = re-wrap one slot. Secrets never re-encrypted. Zero-knowledge: no vendor recovery.</text>

  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#5dcaa5"/></marker></defs>
</svg>
